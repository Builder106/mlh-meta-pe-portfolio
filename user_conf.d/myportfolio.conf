map $request_method $timeline_post_limit_key {
    default "";
    POST    $binary_remote_addr;
}

limit_req_zone $timeline_post_limit_key zone=timeline_post_limit:10m rate=1r/m;

server {
    listen 443 ssl default_server reuseport;
    listen [::]:443 ssl default_server reuseport;

    server_name olayinka-vaughan.duckdns.org;

    ssl_certificate         /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;

    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    limit_req_status 429;

    location /api/timeline_post {
        limit_req zone=timeline_post_limit nodelay;
        proxy_pass http://myportfolio:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://myportfolio:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
